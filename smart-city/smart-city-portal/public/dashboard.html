<!DOCTYPE html>
<html>
<head>
  <title>User Dashboard - Smart City</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- 🔐 LOGIN CHECK (ADD HERE) -->
  <script>
    if(!localStorage.getItem("role")){
      window.location.href = "login.html";
    }
  </script>

</head>
<body>

<header>
  <h1>Smart City Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<section>
  <h2>City Announcements</h2>
  <div id="slidesContainer"></div>
</section>

<section>
  <h2>Report an Issue</h2>
  
  <input type="text" id="problem" placeholder="Enter problem (road damage, water issue etc)">
  <input type="text" id="location" placeholder="Enter location">
  <button onclick="reportIssue()">Submit Issue</button>

</section>

<section>
  <h2>Your City Issues</h2>
  <div id="issuesList"></div>
</section>

<script src="js/app.js"></script>

<!-- HELP CHAT -->
<div class="chat-icon" onclick="toggleChat()">💬 Help</div>

<div class="chat-box" id="chatBox">
  <div class="chat-header">Smart City Help</div>

  <div class="chat-body">
    <p>Hello 👋</p>
    <p>How can I help you?</p>
    <ul>
      <li>Login issue</li>
      <li>Report city problem</li>
      <li>View dashboard</li>
    </ul>
  </div>
</div>

</body>
</html>
