<!DOCTYPE html>
<html>
<head>
  <title>Transport Services</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="service-header">
  <h1>🚍 Smart Transport Management</h1>
  <p>Real-time city mobility & traffic services</p>
</div>

<div class="service-container">

  <div class="info-box">
    <h2>Live Updates</h2>
    <ul>
      <li>Metro delay — 10 mins</li>
      <li>New bus route launched</li>
      <li>Traffic congestion alert</li>
    </ul>
  </div>

  <div class="complaint-panel">
    <h2>Report Issue</h2>
    <input placeholder="Bus delay / accident / traffic issue">
    <input placeholder="Location">
    <button>Submit</button>
  </div>

  <div class="resolved-box">
    <h2>Resolved Issues</h2>
    <ul>
      <li>Traffic signal repaired</li>
      <li>Bus stop maintenance completed</li>
    </ul>
  </div>

</div>

<div class="chat-icon">💬 Help</div>

</body>
</html>
